repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^hooks/
      - id: ruff-format
        exclude: ^hooks/

  - repo: local
    hooks:
      - id: bloquear-dados-financeiros
        name: Bloquear dados financeiros no commit
        entry: python hooks/check_dados_financeiros.py
        language: python
        types: [python]
        exclude: |
          (?x)^(
              mappings/
            | mockups/
            | docs/
            | scripts/
            | tests/
            | hooks/check_dados_financeiros\.py
          )

      - id: check-spec
        name: Validar forma canônica das specs de sprint modificadas
        entry: python scripts/check_spec.py --files
        language: system
        files: ^docs/sprints/backlog/sprint_.*\.md$
