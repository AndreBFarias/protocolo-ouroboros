repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: bloquear-dados-financeiros
        name: Bloquear dados financeiros no commit
        entry: python -c "
import sys, re;
padroes = [
  r'\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}',
  r'\\d{2}\\.\\d{3}\\.\\d{3}/\\d{4}-\\d{2}',
  r'agencia.*\\d{4}.*conta.*\\d+',
];
erros = [];
for f in sys.argv[1:]:
  try:
    with open(f, encoding='utf-8', errors='ignore') as fh:
      for i, linha in enumerate(fh, 1):
        for p in padroes:
          if re.search(p, linha, re.IGNORECASE):
            erros.append(f'{f}:{i}: possivel dado financeiro');
            break
  except: pass
if erros:
  print('[BLOQUEADO] Dados financeiros detectados:');
  for e in erros[:10]: print(f'  {e}');
  sys.exit(1)
"
        language: python
        types: [python]
        exclude: (mappings/|tests/fixtures/)
