name: CI protocolo-ouroboros

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-lint-

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check src/ scripts/ --config pyproject.toml

      - name: Format check (ruff format)
        run: ruff format --check src/ scripts/ --config pyproject.toml

      - name: Acentuação PT-BR (CLAUDE.md regra inviolável #1)
        run: python3 scripts/check_acentuacao.py --all

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-test-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Smoke aritmético (10 contratos globais do XLSX)
        run: python3 scripts/smoke_aritmetico.py --strict

      - name: Validate configs
        run: |
          python3 -c "import yaml; yaml.safe_load(open('mappings/categorias.yaml'))"
          python3 -c "from pathlib import Path; assert Path('src/pipeline.py').exists()"

      - name: Check frontmatter concluida_em em sprints concluidas
        run: python3 scripts/check_concluida_em.py
