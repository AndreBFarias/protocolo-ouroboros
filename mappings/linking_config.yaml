# Thresholds de linking documento -> transacao (Sprint 48 + Sprint 95).
#
# Cada tipo de documento tem parametros distintos:
#
#   janela_dias:            delta maximo entre data_emissao do documento e
#                           data da transacao bancaria (faixa [-N, +N]).
#   diff_valor_percentual:  diferenca relativa maxima entre total do documento
#                           e valor da transacao (ex.: 0.01 = ate 1%).
#   confidence_minimo:      score minimo (0..1) para criar a aresta sem gerar
#                           proposta. Abaixo disso o linking vira proposta.
#   peso_temporal_diario:   penalidade no score por dia de diferenca (default
#                           0.10 = comportamento Sprint 48). Sprint 95: tipos
#                           que pagam tarde (holerite, DAS, boleto) usam peso
#                           menor para que delta de 30-60 dias nao zere score.
#   ancora_temporal:        nome do campo de metadata usado como CENTRO da
#                           janela temporal. Default: 'data_emissao'. Sprint 95b:
#                           DAS PARCSN usa 'vencimento' (mais proximo do PIX
#                           Receita Federal real do que data_emissao da guia).
#                           Fallback automatico para 'data_emissao' se o campo
#                           declarado nao existir no metadata do documento.
#
# Heuristicas de score:
#   1.0  base
#   -peso_temporal_diario por dia de diferenca (modulo)
#   -0.50 * diff_valor_percentual (soma linear)
#   +0.30 se CNPJ do documento tambem aparece na contraparte da transacao
#   +0.10 adicional quando delta_dias == 0 e CNPJ bate (Pix instantaneo)
#
# Regra de conflito (independente de confidence):
#   Se top-1 e top-2 empatam (score dentro de MARGEM_EMPATE), nao cria
#   aresta e gera proposta em docs/propostas/linking/<doc_id>.md.
#
# Comentario sem acentos por coerencia N-para-N com outros YAMLs do projeto.

tipos:
  danfe_nfe:
    janela_dias: 3
    diff_valor_percentual: 0.01
    confidence_minimo: 0.80
  nfe_modelo_55:
    janela_dias: 3
    diff_valor_percentual: 0.01
    confidence_minimo: 0.80
  nfce_modelo_65:
    # Sprint LINK-AUDIT-01 (2026-05-15): NFCe emitida pelo varejo geralmente bate
    # com transacao no mesmo dia, mas em alguns casos (cartao de credito processado
    # em batch, cancelamento + reemissao) a janela pode chegar a 2-4 dias. Caso
    # real no grafo: docs 7679/7680 (R$ 595,52 e R$ 629,98) sem tx <= janela=1d,
    # mas tx 7277 (R$ 590,35 em 23/03) e plausivel candidata humana se janela for
    # 30d. Subimos janela para 30d para gerar PROPOSTAS em vez de "sem_candidato"
    # silencioso (visibilidade para o supervisor humano). Tolerancia 1% mantida
    # estrita -- NFCe imprime ate centavo e divergencia > 1% e link suspeito.
    janela_dias: 30
    diff_valor_percentual: 0.01
    confidence_minimo: 0.85
  cupom_fiscal:
    # Sprint LINK-AUDIT-01 (2026-05-15): cupom fiscal de cartao de credito pode
    # ter liquidacao em D+1 ate D+7 dependendo do banco/varejo. Casos reais no
    # grafo (docs 7584, 7638, 7760) tem tx candidata a 14-19 dias antes da
    # emissao do cupom -- subir janela para 7d cobre o caso comum sem inflacionar
    # falsos positivos (cupom a vista continua exigindo tx D+0 para confidence_minimo).
    # Subir alem disso (>=15d) confunde compras com mesmo varejo em meses diferentes.
    janela_dias: 7
    diff_valor_percentual: 0.03
    confidence_minimo: 0.70
  cupom_termico:
    janela_dias: 1
    diff_valor_percentual: 0.03
    confidence_minimo: 0.70
  recibo_nao_fiscal:
    janela_dias: 1
    diff_valor_percentual: 0.01
    confidence_minimo: 0.75
  comprovante_pix_foto:
    # Sprint INFRA-LINKAR-PIX-TRANSACAO (2026-05-13). PIX e executado em D+0
    # (instantaneo): janela curta (3 dias absorve fuso de captura da foto vs
    # data registrada no extrato bancario). Valor da transferencia bate ao
    # centavo na descricao do extrato; tolerancia minima (0.5%). Confidence
    # 0.70 reflete que o boost por E2E (id_transacao na descricao) leva o
    # score canonico para 1.0 quando ha match unico -- caso PIX comum.
    janela_dias: 3
    diff_valor_percentual: 0.005
    confidence_minimo: 0.70
    peso_temporal_diario: 0.05
  receita_medica:
    # Linking e indireto (prescreve_cobre -> item). Pensado para coerencia de
    # cadastro, mas sem conversao direta receita -> transacao bancaria.
    janela_dias: 30
    diff_valor_percentual: 0.00
    confidence_minimo: 0.50
  garantia:
    # Compra original (pode estar dias antes da emissao do termo).
    janela_dias: 30
    diff_valor_percentual: 0.10
    confidence_minimo: 0.60

  # Sprint 95: tipos que pagam dias depois da data_emissao do documento.
  # Janela ampla + peso_temporal_diario reduzido para que delta natural nao
  # zere o score. Tolerancia de valor maior em holerite porque metadata.total
  # carrega o BRUTO mas a transacao bancaria carrega o LIQUIDO (~ 14% menor).
  holerite:
    janela_dias: 35
    diff_valor_percentual: 0.30
    confidence_minimo: 0.55
    peso_temporal_diario: 0.01

  das_parcsn_andre:
    janela_dias: 60
    diff_valor_percentual: 0.05
    confidence_minimo: 0.55
    peso_temporal_diario: 0.005
    # Sprint 95b: pagamento PIX RECEITA FEDERAL ocorre proximo do vencimento,
    # nao da data_emissao da guia. Centrar a janela em vencimento reduz
    # sobreposicao entre parcelas adjacentes (mar/abr/mai vs janela 60d).
    ancora_temporal: vencimento

  boleto_servico:
    janela_dias: 75
    diff_valor_percentual: 0.05
    confidence_minimo: 0.55
    peso_temporal_diario: 0.005

  dirpf_retif:
    # DIRPF e administrativo: pagamento (DARF de ajuste) pode ocorrer em ate
    # 365 dias. Score depende quase so de bater valor + CNPJ Receita Federal.
    janela_dias: 365
    diff_valor_percentual: 0.05
    confidence_minimo: 0.55
    peso_temporal_diario: 0.001

# Fallback para tipos nao listados acima.
default:
  janela_dias: 3
  diff_valor_percentual: 0.02
  confidence_minimo: 0.75
  peso_temporal_diario: 0.10

# Margem de empate: se |score_top1 - score_top2| < este valor, gera proposta
# em vez de linkar. Evita ligar silenciosamente quando ha duas candidatas
# quase identicas.
#
# Sprint LINK-AUDIT-01 (2026-05-15): baixamos de 0.05 para 0.02 com base em
# analise empirica do grafo (scripts/diagnosticar_linking.py). De 20 propostas
# de conflito ativas, 14 tem diff(top-1, top-2) = 0 (empate real -- continuam
# em conflito como deve ser) e 6 tem diff entre 0.011 e 0.022 em que top-1
# tem clara vantagem (diff_valor menor). Margem 0.02 libera 3 desses 6 casos
# em que top-1 e objetivamente melhor sem aumentar risco de link errado --
# os 14 empates reais continuam sendo proposta. Os outros 3 casos (diff entre
# 0.02 e 0.022) permanecem em conflito como protecao extra (margem aplicada
# inclusive: top-1 ganha apenas se diff >= 0.02).
margem_empate: 0.02
