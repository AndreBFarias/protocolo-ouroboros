      - "fazenda\\.\\w+\\.gov\\.br/nfce"
    extrator_modulo: src.extractors.nfce_pdf
    origem_sprint: 44b
    pasta_destino_template: "data/raw/{pessoa}/nfs_fiscais/nfce/"
    renomear_template:
