      - "(?i)Comprovante\\s+de\\s+transfer[êe]ncia"
      - "(?i)P[ix]{2}\\s+(realizado|enviado|em\\s+andamento)"
      - "(?i)ID\\s+da\\s+transa[çc][ãa]o"
      - "(?i)Chave\\s+P[ix]{2}"
