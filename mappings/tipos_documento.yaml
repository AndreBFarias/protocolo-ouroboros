# =============================================================================
# tipos_documento.yaml -- registro canônico de tipos de documento aceitos pelo intake
# =============================================================================
#
# FONTE CANÔNICA DE EXECUÇÃO. O bloco YAML dentro de
# `docs/sprints/backlog/sprint_41_intake_universal_multiformato.md` é apenas
# documentação (SPEC); este arquivo é o que `src/intake/classifier.py` carrega
# em runtime. Ao alterar uma regra, manter os dois sincronizados (meta-regra
# N-para-N #1 do AI.md). Validação via teste e/ou conferência humana.
#
# Schema de cada entrada -- ver doc completa na Sprint 41:
#   id:                       identificador único (snake_case)
#   descricao:                o que é (humano-legível)
#   prioridade:               especifico | normal | fallback (ordem de avaliação)
#   match_mode:               all | any -- AND ou OR sobre regex_conteudo
#   mimes:                    lista de MIMEs aceitos no preview
#   regex_conteudo:           padrões aplicados ao texto extraído (preview)
#                             usar src/intake/glyph_tolerant.py para PDFs nativos (Armadilha #20)
#   extrator_modulo:          caminho de import do extrator (null = só roteamento, sem extrator ainda)
#   origem_sprint:            sprint que criou a regra (rastreabilidade -- só metadado)
#   pasta_destino_template:   destino com placeholder {pessoa}
#   renomear_template:
#     com_data:               usado quando a detecção rasa extrai data (regex DD/MM/YYYY)
#     sem_data:               fallback quando não há data extraível
#
# Convenção do nome canônico no intake: <TIPO>[_<YYYY-MM-DD>]_<sha8>.<ext>
# Renomeação rica (com fornecedor/número/empresa) é responsabilidade do EXTRATOR
# dedicado, que tem o conteúdo parseado.
# =============================================================================

tipos:

  # ============================================================
  # === ESPECÍFICO -- assinaturas únicas (Sprint 90a inclui holerite) ===
  # ============================================================

  - id: cupom_garantia_estendida
