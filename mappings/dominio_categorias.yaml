# Domínio semântico por categoria — Sprint CATEGORIZER-SUGESTAO-AUDITORIA-RUIDO (2026-05-16)
#
# Para cada categoria, declara:
# - `tokens_obrigatorios`: pelo menos 1 desses tokens (substring case-insensitive)
#   precisa aparecer na descrição para a sugestão ser ELEGÍVEL para alta confiança.
#   Se ausente: confiança é multiplicada por penalidade.
# - `tokens_proibitivos`: se qualquer aparece, sugestão NÃO é elegível para alta
#   confiança (risco_estimado=ALTO).
# - `valor_min` / `valor_max`: faixa típica em reais. Fora dela = risco MÉDIO.
#
# Filosofia: filtros de domínio são apenas para classificar RISCO. Não bloqueiam
# a sugestão — sinalizam para revisão humana. Decisão final é do supervisor.
#
# Curadoria humana validada no dataset 2026-05-16 (1031 transações "Outros").

