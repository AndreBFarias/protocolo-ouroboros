# =============================================================================
# seguradoras.yaml -- registro canônico de seguradoras que emitem bilhetes SUSEP
# =============================================================================
#
# Fonte canônica para entity resolution de Seguradora no grafo (Sprint 47c).
# Resolução: por CNPJ (chave primária). Código SUSEP é auxiliar -- alguns
# bilhetes têm glyph quebrado no código (D6238 em vez de 06238, Armadilha A47c-3),
# então o código fica subordinado ao CNPJ na validação.
#
# Ao detectar seguradora nova (CNPJ não listado aqui), o extrator gera proposta
# em `docs/propostas/seguradoras/<cnpj-normalizado>.md` para cadastro manual.
#
# Schema:
#   cnpj: canônico XX.XXX.XXX/XXXX-XX (chave primária)
#   razao_social: nome jurídico completo
#   nome_canonico: uppercase para o grafo
#   codigo_susep: 5 dígitos (string, preserva zero à esquerda)
#   aliases: variantes de escrita observadas em bilhetes
#   dominio: site oficial (útil para relatórios)
# =============================================================================

seguradoras:

  - cnpj: "61.074.175/0001-38"
    razao_social: "MAPFRE Seguros Gerais S.A."
    nome_canonico: "MAPFRE SEGUROS GERAIS S.A."
    codigo_susep: "06238"
    aliases:
      - "MAPFRE Seguros Gerais 5.A."
      - "MAPFRE Seguros Gerais 5.À."
      - "MAPFRE"
    dominio: "mapfre.com.br"

  - cnpj: "08.279.191/0001-84"
    razao_social: "BNP Paribas Cardif Seguros S.A."
    nome_canonico: "BNP PARIBAS CARDIF SEGUROS S.A."
    codigo_susep: "05720"
    aliases:
      - "Cardif Seguros"
      - "BNP Cardif"
      - "Cardif"
    dominio: "cardif.com.br"

# "O seguro não evita o sinistro -- mas distribui o peso." -- princípio atuarial
