# =============================================================================
# layouts_nfce.yaml -- registro de layouts NFC-e modelo 65 por SEFAZ estadual
# =============================================================================
#
# Cada SEFAZ emite NFC-e com layout próprio (coluna de tributos, ordem de
# blocos, variações de rótulo). Este arquivo registra as variações já
# observadas e suas regex específicas quando o layout canônico do extrator
# não cobre o caso.
#
# O extrator src/extractors/nfce_pdf.py usa como fallback: tenta o layout
# canônico primeiro; se falhar, consulta este YAML pela UF do CNPJ/chave44.
#
# Fonte canônica de UFs: IBGE (primeiros 2 dígitos da chave 44).
#
# Schema:
#   uf_ibge: código IBGE 2 dígitos (string, preserva zero à esquerda)
#   uf_sigla: UF textual (para logs)
#   url_consulta: URL do QR SEFAZ que aparece no rodapé (pista identificadora)
#   emissores_conhecidos: lista de CNPJs já validados contra este layout
#   particularidades: notas livres para quem for estender
# =============================================================================

layouts:

  - uf_ibge: "53"
    uf_sigla: "DF"
    url_consulta: "fazenda.df.gov.br/nfce"
    emissores_conhecidos:
      - cnpj: "00.776.574/0160-79"
        razao_social: "Americanas SA loja 0337 (Gama)"
    particularidades:
      - "CONSUMIDOR CPF opcional antes do bloco NFCe nº/Serie."
      - "URL QR com typo frequente no OCR: 'fazenda df.gov.brinfce' (espaços/pontos perdidos)."

  # Outros estados serão adicionados conforme aparecerem:
  # - uf_ibge: "35" (SP), url fazenda.sp.gov.br/nfce
  # - uf_ibge: "33" (RJ), url fazenda.rj.gov.br/nfce

# "Cada UF tem seu cupom, mas a nota é federal." -- princípio fiscal
