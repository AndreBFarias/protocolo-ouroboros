# =============================================================================
# layouts_danfe.yaml -- registro de layouts DANFE (NFe modelo 55) por emissor
# =============================================================================
#
# DANFE é a representação impressa A4 da NFe modelo 55 (com destinatário,
# ICMS por item, layouts por emissor: Bling, eNotas, NFe.io, SEFAZ estaduais,
# varejo direto). Cada emissor varia o rótulo de campo, a ordem de colunas
# da tabela de produtos e o tratamento de CFOP.
#
# O extrator src/extractors/danfe_pdf.py usa este arquivo como banco de
# variações conhecidas. O layout canônico do extrator cobre >90% dos casos;
# quando o layout do emissor destoa, registra-se aqui para referência da
# conferência artesanal (docs/propostas/sprint_44_conferencia.md) e para
# evoluções futuras da regex.
#
# Schema:
#   nome: identificador curto do layout (string)
#   emissor: sistema emissor (Bling, eNotas, NFe.io, SEFAZ-DF, etc.)
#   cnpjs_conhecidos: lista de CNPJs já validados contra este layout
#   particularidades: notas livres sobre regex, ordem de colunas, tributos
# =============================================================================

layouts:

  - nome: "canonico_a4"
    emissor: "genérico (Bling/eNotas padrão)"
    cnpjs_conhecidos:
      - cnpj: "00.776.574/0160-79"
        razao_social: "Americanas SA loja 0337 (DF)"
      - cnpj: "11.222.333/0001-44"
        razao_social: "Serviços de TI LTDA ME (DF)"
      - cnpj: "22.333.444/0001-55"
        razao_social: "Supermercado Exemplo LTDA (SP)"
    particularidades:
      - "Cabeçalho com 'DANFE' + 'DOCUMENTO AUXILIAR DA NOTA FISCAL ELETRÔNICA'."
      - "Bloco DESTINATÁRIO / REMETENTE sempre presente (diferença vs NFC-e)."
      - "Tabela de itens: CÓDIGO DESCRIÇÃO NCM CFOP UN QTD V.UNIT V.TOTAL + tributos."
      - "CFOP 5XXX = saída; 1XXX/2XXX = entrada (este extrator assume saída)."
      - "Chave 44 em linha separada, formatada em 11 grupos de 4 dígitos."

  # Registre aqui layouts divergentes encontrados na conferência artesanal.
  # Exemplo:
  # - nome: "nfe_io_compact"
  #   emissor: "NFe.io"
  #   cnpjs_conhecidos: []
  #   particularidades:
  #     - "Descrição pode quebrar em 2 linhas; ler até achar NCM na coluna."

# "Cada emissor tem sua estética; a chave é a mesma." -- princípio fiscal
