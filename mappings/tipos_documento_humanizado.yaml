# =============================================================================
# tipos_documento_humanizado.yaml -- nomes humanos para tipos de documento
# =============================================================================
#
# Sprint UX-126 (AC1). Mapping {tipo_canonico_slug -> nome_humano} usado pela
# UI do dashboard (página Catalogação) para substituir slugs crus
# (ex: `das_parcsn_andre`) por rótulos legíveis (ex: `DAS Parcelado André`).
#
# Canônicos: ver `mappings/tipos_documento.yaml` (schema do intake) e
# `src/dashboard/paginas/catalogacao.py::ROTULOS_TIPO_DOCUMENTO` (mapping
# legado restrito a alguns tipos). Este arquivo é a fonte de verdade
# unificada para humanização de UI.
#
# Fallback (helper `humanizar()` em
# `src/dashboard/componentes/humanizar_tipos.py`): se slug não está aqui,
# devolve `slug.replace('_', ' ').title()`.
#
# Convenção: use acentuação correta (PT-BR humano) -- helper trata como UTF-8.
# =============================================================================

