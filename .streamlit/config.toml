[theme]
# Sprint UX-RD-01: paleta migrada espelhando src/dashboard/tema.py CORES.
# backgroundColor = bg-base ; secondaryBackgroundColor = bg-surface ;
# textColor = text-primary. primaryColor mantém roxo Dracula como acento
# da marca (botões, links, focus ring).
# FIX-08: trocar font="monospace" por "sans serif". O Streamlit aplicava
# "Source Code Pro", monospace globalmente em h1/h2/p/button/sidebar etc.,
# pisando em var(--ff-sans)=Inter. tema_css.py importa explicitamente
# Inter + JetBrains Mono e aplica conforme seletor (mockup canônico).
primaryColor = "#bd93f9"
backgroundColor = "#0e0f15"
secondaryBackgroundColor = "#1a1d28"
textColor = "#f8f8f2"
font = "sans serif"

[server]
headless = true
