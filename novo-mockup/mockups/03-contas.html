<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><title>Ouroboros — Contas</title>
<link rel="stylesheet" href="../_shared/tokens.css">
<link rel="stylesheet" href="../_shared/components.css">
<style>
.contas-grid { display:grid; grid-template-columns: repeat(3,1fr); gap: var(--sp-3); margin-bottom: var(--sp-4); }
.acc { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--r-md); padding: var(--sp-4); border-top: 3px solid var(--acc); position:relative; }
.acc .head { display:flex; align-items:center; gap: var(--sp-3); margin-bottom: var(--sp-3); }
.acc .logo { width:40px; height:40px; border-radius: var(--r-sm); background: var(--acc); color: var(--bg-base); display:grid; place-items:center; font-family: var(--ff-mono); font-weight:700; }
.acc .name { font-family: var(--ff-mono); font-size: var(--fs-15); }
.acc .tipo { font-family: var(--ff-mono); font-size: 10px; letter-spacing:.08em; text-transform:uppercase; color: var(--text-muted); }
.acc .saldo { font-family: var(--ff-mono); font-size: 28px; font-weight:500; line-height:1; font-variant-numeric: tabular-nums; margin-bottom: 4px; }
.acc .delta { font-family: var(--ff-mono); font-size: 11px; }
.acc .meta { display:grid; grid-template-columns: repeat(2,1fr); gap:var(--sp-2); margin-top: var(--sp-3); padding-top: var(--sp-3); border-top: 1px solid var(--border-subtle); }
.acc .meta div { font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted); }
.acc .meta strong { color: var(--text-primary); display:block; font-size: 13px; margin-top: 2px; }
.acc-spark { width:100%; height:36px; margin: var(--sp-2) 0; }
.section-bar { display:flex; align-items:baseline; gap:var(--sp-3); margin: var(--sp-5) 0 var(--sp-3); }
.section-bar h2 { font-family: var(--ff-mono); font-size: var(--fs-13); letter-spacing:.08em; text-transform:uppercase; color: var(--text-secondary); margin:0; font-weight:500; }
.cards-credito { display:grid; grid-template-columns: repeat(2,1fr); gap: var(--sp-3); margin-bottom: var(--sp-4); }
.cc-card { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--r-md); padding: var(--sp-4); }
.cc-head { display:flex; align-items:center; gap: var(--sp-2); margin-bottom: var(--sp-3); }
.cc-name { font-family: var(--ff-mono); font-size: 14px; }
.cc-final { font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted); margin-left:auto; letter-spacing:.06em; }
.cc-vals { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--sp-3); margin-top: var(--sp-2); }
.cc-vals > div .l { font-family: var(--ff-mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color: var(--text-muted); }
.cc-vals > div .v { font-family: var(--ff-mono); font-size: 18px; font-weight:500; font-variant-numeric: tabular-nums; }
.cc-bar { height:6px; background: var(--bg-inset); border-radius: var(--r-full); overflow:hidden; margin-top: var(--sp-3); }
.cc-bar > span { display:block; height:100%; }
.cc-foot { display:flex; justify-content:space-between; font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
<div id="shell-root"></div>
<script src="../_shared/glyphs.js"></script>
<script src="../_shared/shell.js"></script>
<script>
montarShell({clusterAtivo:'financas', abaAtiva:'contas', breadcrumb:['Ouroboros','Finanças','Contas'], acoes:[{label:'Adicionar conta',icon:'plus',onClick:"toast('Adicionar conta · em desenvolvimento','warn')"},{label:'Sincronizar OFX', icon:'refresh', primary:true, onClick:"toast('Sincronizando 6 contas...'); setTimeout(()=>toast('6 contas atualizadas · 142 novas transações'),1200)"}]});
const fmt = v => 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
function spark(arr, color, w=200, h=36) {
  const min=Math.min(...arr), max=Math.max(...arr), span=Math.max(0.01,max-min);
  const pts = arr.map((v,i)=>`${(i/(arr.length-1))*w},${h-((v-min)/span)*h*0.85-2}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" class="acc-spark"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.4"/></svg>`;
}
const CONTAS = [
  { banco:'C6 Bank', sigla:'C6', cor:'var(--accent-purple)', tipo:'Corrente · CC', saldo:8420.50, delta:'+R$ 220 · 30d', sparkline:[7800,7900,8100,7950,8200,8350,8420], doc:'extrato_c6_2026-04.ofx', sha:'a1f9c1e2', ultSync:'2026-05-01 14:32', txns30:48 },
  { banco:'Bradesco', sigla:'BD', cor:'var(--accent-pink)', tipo:'Corrente · CC PJ', saldo:14280.10, delta:'+R$ 1.842 · 30d', sparkline:[12100,12500,12900,13200,13800,14000,14280], doc:'extrato_bradesco_2026-04.ofx', sha:'b7d2a04f', ultSync:'2026-05-01 14:35', txns30:62 },
  { banco:'Inter', sigla:'IN', cor:'var(--accent-orange)', tipo:'Investimento · CDB', saldo:8720.25, delta:'+R$ 84 · 30d', sparkline:[8100,8200,8350,8480,8580,8680,8720], doc:'extrato_inter_2026-04.pdf', sha:'2bdd91aa', ultSync:'2026-05-01 13:18', txns30:32 },
];
const CARTOES = [
  { banco:'Nubank', final:'5532', cor:'var(--accent-purple)', limite:18000, usado:6420, fatura:6420, vence:'2026-05-10', dias:9 },
  { banco:'C6 Cartão', final:'2018', cor:'var(--accent-pink)', limite:12000, usado:2840, fatura:2840, vence:'2026-05-15', dias:14 },
];

const contasHtml = CONTAS.map(c => `
  <div class="acc" style="--acc:${c.cor};">
    <div class="head">
      <div class="logo">${c.sigla}</div>
      <div><div class="name">${c.banco}</div><div class="tipo">${c.tipo}</div></div>
    </div>
    <div class="saldo">${fmt(c.saldo)}</div>
    <div class="delta" style="color:var(--d7-graduado);">${c.delta}</div>
    ${spark(c.sparkline, c.cor)}
    <div class="meta">
      <div>último OFX<strong style="font-family:var(--ff-mono);font-size:11px;color:var(--accent-purple);">${c.doc}</strong></div>
      <div>sha8<strong style="font-family:var(--ff-mono);font-size:11px;">${c.sha}</strong></div>
      <div>sincronizado<strong>${c.ultSync.split(' ')[1]}</strong></div>
      <div>txns 30d<strong>${c.txns30}</strong></div>
    </div>
  </div>
`).join('');
const total = CONTAS.reduce((a,c)=>a+c.saldo,0);

const ccHtml = CARTOES.map(c => {
  const pct = c.usado/c.limite;
  const cor = pct>0.7?'var(--accent-red)':pct>0.4?'var(--accent-yellow)':'var(--d7-graduado)';
  return `
    <div class="cc-card" style="border-left:3px solid ${c.cor};">
      <div class="cc-head">
        <div class="cc-name">${c.banco}</div>
        <span class="cc-final">···· ${c.final}</span>
      </div>
      <div class="cc-vals">
        <div><div class="l">limite</div><div class="v">${fmt(c.limite)}</div></div>
        <div><div class="l">usado</div><div class="v" style="color:${cor};">${fmt(c.usado)}</div></div>
        <div><div class="l">fatura aberta</div><div class="v" style="color:var(--accent-yellow);">${fmt(c.fatura)}</div></div>
      </div>
      <div class="cc-bar"><span style="width:${pct*100}%;background:${cor};"></span></div>
      <div class="cc-foot"><span>${Math.round(pct*100)}% usado</span><span>vence ${c.vence} · ${c.dias}d</span></div>
    </div>
  `;
}).join('');

document.getElementById('main-root').innerHTML = `
  <div class="page-header">
    <div>
      <h1 class="page-title">CONTAS</h1>
      <p class="page-subtitle">Saldos consolidados de todas as contas e cartões. Cada conta é alimentada por um OFX canônico — quando o sha8 muda, o pipeline reprocessa.</p>
    </div>
    <div class="page-meta">
      <span class="sprint-tag">Sprint 4</span>
      <span class="pill pill-d7-graduado">3 contas · 2 cartões</span>
    </div>
  </div>
  <div style="background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--r-md);padding:var(--sp-4) var(--sp-5);margin-bottom:var(--sp-4);display:flex;align-items:center;gap:var(--sp-5);">
    <div><div style="font-family:var(--ff-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);">Patrimônio líquido</div>
      <div style="font-family:var(--ff-mono);font-size:36px;font-weight:500;line-height:1;font-variant-numeric:tabular-nums;margin-top:4px;">${fmt(total)}</div>
    </div>
    <div style="height:48px;width:1px;background:var(--border-subtle);"></div>
    <div><div style="font-family:var(--ff-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);">Cartões · fatura aberta</div>
      <div style="font-family:var(--ff-mono);font-size:24px;color:var(--accent-yellow);font-variant-numeric:tabular-nums;margin-top:4px;">${fmt(9260)}</div>
    </div>
    <div style="margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--text-muted);text-align:right;">
      <div>última sincronização</div>
      <div style="color:var(--text-primary);font-size:13px;">2026-05-01 14:35</div>
    </div>
  </div>
  <div class="section-bar"><h2>Contas correntes & investimento</h2><span style="margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--text-muted);">3 origens OFX</span></div>
  <div class="contas-grid">${contasHtml}</div>
  <div class="section-bar"><h2>Cartões de crédito</h2><span style="margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--text-muted);">2 cartões · 12% utilização</span></div>
  <div class="cards-credito">${ccHtml}</div>
`;
hidratarGlyphs(document.getElementById('main-root'));
</script></body></html>
