<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Ouroboros — Visão Geral</title>
<link rel="stylesheet" href="../_shared/tokens.css">
<link rel="stylesheet" href="../_shared/components.css">
<style>
.hero {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: var(--sp-6);
  margin-bottom: var(--sp-4);
  display: grid; grid-template-columns: 1.6fr 1fr; gap: var(--sp-6);
  align-items: center;
}
.hero h1 { font-family: var(--ff-mono); font-size: 32px; font-weight: 500; letter-spacing: -0.02em; margin: 0 0 var(--sp-2); }
.hero p  { color: var(--text-secondary); font-size: var(--fs-15); line-height: 1.6; margin: 0; max-width: 56ch; }
.hero .marca { font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--accent-purple); text-transform: uppercase; margin-bottom: var(--sp-3); display: block;}
.hero .ouroboros {
  width: 220px; height: 220px; margin-left: auto;
  display: grid; place-items: center;
}

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-3); margin-bottom: var(--sp-4); }
.kpi {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-md); padding: var(--sp-4);
  display: flex; flex-direction: column; gap: 6px;
}
.kpi .l { font-family: var(--ff-mono); font-size: var(--fs-11); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
.kpi .v { font-family: var(--ff-mono); font-size: 32px; font-weight: 500; line-height: 1; font-variant-numeric: tabular-nums; }
.kpi .d { font-family: var(--ff-mono); font-size: var(--fs-12); color: var(--text-muted); }
.kpi.up   .v { color: var(--d7-graduado); }
.kpi.warn .v { color: var(--accent-yellow); }
.kpi.bad  .v { color: var(--accent-red); }

.dual { display: grid; grid-template-columns: 1.4fr 1fr; gap: var(--sp-4); margin-bottom: var(--sp-4); }

.cluster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-3); }
.cluster-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-md); padding: var(--sp-4);
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: var(--sp-2);
  transition: border-color .15s, transform .15s;
}
.cluster-card:hover { border-color: var(--accent-purple); transform: translateY(-2px); }
.cluster-card .head { display: flex; align-items: center; gap: var(--sp-2); }
.cluster-card .head .ic { color: var(--accent-purple); }
.cluster-card .head h3 { font-family: var(--ff-mono); font-size: var(--fs-15); font-weight: 500; margin: 0; letter-spacing: -0.01em; }
.cluster-card .desc { font-size: var(--fs-13); color: var(--text-muted); line-height: 1.5; }
.cluster-card .stats { display: flex; gap: var(--sp-3); margin-top: auto; padding-top: var(--sp-2); border-top: 1px solid var(--border-subtle); }
.cluster-card .stats span { font-family: var(--ff-mono); font-size: var(--fs-11); color: var(--text-secondary); }
.cluster-card .stats strong { color: var(--text-primary); margin-right: 4px; }

.timeline { display: flex; flex-direction: column; }
.tl-item { display: grid; grid-template-columns: 90px 24px 1fr; gap: var(--sp-2); padding: 8px 0; border-bottom: 1px dashed var(--border-subtle); }
.tl-item .when { font-family: var(--ff-mono); font-size: var(--fs-11); color: var(--text-muted); padding-top: 2px; }
.tl-item .ic   { color: var(--accent-purple); padding-top: 2px; }
.tl-item .what { font-size: var(--fs-13); color: var(--text-secondary); line-height: 1.45; }
.tl-item .what strong { color: var(--text-primary); font-family: var(--ff-mono); }
.tl-item .what code { color: var(--accent-purple); }
</style>
</head>
<body>
<div id="shell-root"></div>
<script src="../_shared/glyphs.js"></script>
<script src="../_shared/shell.js"></script>
<script src="./_visao-render.js"></script>
</body>
</html>
