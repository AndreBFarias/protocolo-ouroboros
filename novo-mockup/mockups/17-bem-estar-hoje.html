<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Ouroboros — Bem-estar · Hoje</title>
<link rel="stylesheet" href="../_shared/tokens.css">
<link rel="stylesheet" href="../_shared/components.css">
<style>
/* ─────────── Layout: hero esquerda + coluna direita ─────────── */
.hoje-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
  gap: var(--sp-4);
}

/* ─────────── Hero: humor rápido ─────────── */
.hero-humor {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: var(--sp-6);
  position: relative;
  overflow: hidden;
}
.hero-humor::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 40% at 80% 20%, rgba(189,147,249,0.10), transparent 70%);
  pointer-events: none;
}
.hero-humor-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-5);
  position: relative;
}
.hero-humor-titulo {
  font-family: var(--ff-mono);
  font-size: var(--fs-11);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0;
}
.hero-humor-data {
  font-family: var(--ff-mono);
  font-size: var(--fs-13);
  color: var(--text-secondary);
}

/* Sliders */
.sliders {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-4) var(--sp-6);
  margin-bottom: var(--sp-5);
}
.slider-bloco { position: relative; }
.slider-label {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: var(--sp-2);
}
.slider-label .nome {
  font-family: var(--ff-mono);
  font-size: var(--fs-12);
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.slider-label .valor {
  font-family: var(--ff-mono);
  font-size: var(--fs-24);
  font-weight: 500;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.slider-pista {
  display: flex;
  gap: 4px;
  height: 36px;
}
.slider-bloco .slider-pista button {
  flex: 1;
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background .12s, border-color .12s, transform .12s;
  display: grid; place-items: center;
  font-family: var(--ff-mono);
  font-size: var(--fs-12);
  color: var(--text-muted);
}
.slider-bloco .slider-pista button:hover {
  background: var(--bg-elevated);
  color: var(--text-secondary);
}
.slider-bloco .slider-pista button.ativo {
  background: var(--cor, var(--accent-purple));
  border-color: var(--cor, var(--accent-purple));
  color: var(--text-inverse);
  font-weight: 500;
}
.slider-bloco .slider-pista button.menor {
  background: rgba(189,147,249, calc(0.04 * var(--peso, 1)));
  border-color: rgba(189,147,249, calc(0.10 * var(--peso, 1)));
  color: var(--text-secondary);
}

/* Tags */
.bloco-tags {
  margin-bottom: var(--sp-5);
  position: relative;
}
.bloco-tags h4 {
  font-family: var(--ff-mono);
  font-size: var(--fs-11);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0 0 var(--sp-3);
}
.tags-grid {
  display: flex; flex-wrap: wrap;
  gap: 6px;
}
.tag-chip {
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  border-radius: var(--r-full);
  padding: 4px 12px;
  font-family: var(--ff-mono);
  font-size: var(--fs-12);
  cursor: pointer;
  transition: all .12s;
}
.tag-chip:hover { border-color: var(--border-strong); color: var(--text-primary); }
.tag-chip.ativo {
  background: var(--accent-purple);
  border-color: var(--accent-purple);
  color: var(--text-inverse);
}

/* Inputs adicionais */
.inputs-extra {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-3);
  margin-bottom: var(--sp-4);
  position: relative;
}
.input-bloco label {
  display: block;
  font-family: var(--ff-mono);
  font-size: var(--fs-11);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.input-bloco input {
  width: 100%;
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-sm);
  padding: 8px 10px;
  font-family: var(--ff-mono);
  font-size: var(--fs-13);
  color: var(--text-primary);
}
.input-bloco input:focus { border-color: var(--accent-purple); outline: none; }

.bloco-nota textarea {
  width: 100%;
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  font-family: var(--ff-mono);
  font-size: var(--fs-13);
  color: var(--text-primary);
  resize: vertical;
  min-height: 72px;
}
.bloco-nota textarea:focus { border-color: var(--accent-purple); outline: none; }

.salvar-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: var(--sp-4);
  padding-top: var(--sp-4);
  border-top: 1px solid var(--border-subtle);
  position: relative;
}
.salvar-row .duracao {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--text-muted);
}
.salvar-row .duracao strong { color: var(--accent-green); }

/* ─────────── Coluna direita ─────────── */
.coluna-dir { display: flex; flex-direction: column; gap: var(--sp-4); }

/* Para quem (M33) */
.bloco-para {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: var(--sp-4);
}
.bloco-para h3 {
  font-family: var(--ff-mono);
  font-size: var(--fs-11);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0 0 var(--sp-3);
}
.para-opcoes { display: flex; gap: 6px; flex-wrap: wrap; }
.para-btn {
  flex: 1;
  min-width: 80px;
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  padding: 10px 12px;
  border-radius: var(--r-sm);
  font-family: var(--ff-mono);
  font-size: var(--fs-12);
  cursor: pointer;
  transition: all .12s;
}
.para-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.para-btn.ativo {
  background: rgba(189,147,249,0.10);
  border-color: var(--accent-purple);
  color: var(--accent-purple);
}

/* Status do casal */
.bloco-status {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: var(--sp-4);
}
.bloco-status h3 {
  font-family: var(--ff-mono);
  font-size: var(--fs-11);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0 0 var(--sp-3);
}
.casal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-3);
}
.pessoa-card {
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--cor);
  border-radius: var(--r-sm);
  padding: var(--sp-3);
}
.pessoa-card .pnome {
  font-family: var(--ff-mono);
  font-size: var(--fs-12);
  color: var(--cor);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.pessoa-card .pmedia {
  font-family: var(--ff-mono);
  font-size: var(--fs-24);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.pessoa-card .pdetalhe {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}
.pessoa-card .pmini {
  display: flex; gap: 2px; margin-top: 8px;
}
.pessoa-card .pmini span {
  flex: 1;
  height: 16px;
  background: var(--bg-elevated);
  border-radius: 1px;
}

/* Próximos */
.bloco-proximos {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  flex: 1;
}
.bloco-proximos h3 {
  font-family: var(--ff-mono);
  font-size: var(--fs-11);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0 0 var(--sp-3);
}
.evt-lista { display: flex; flex-direction: column; gap: 4px; }
.evt {
  display: grid;
  grid-template-columns: auto auto 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  padding: 8px 10px;
  background: var(--bg-inset);
  border: 1px solid transparent;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: border-color .12s;
}
.evt:hover { border-color: var(--border-subtle); }
.evt-tipo {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--cor);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  background: var(--bg-elevated);
  padding: 2px 6px;
  border-radius: var(--r-xs);
}
.evt-hora {
  font-family: var(--ff-mono);
  font-size: var(--fs-12);
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}
.evt-titulo {
  font-size: var(--fs-13);
  color: var(--text-primary);
}
.evt-tag {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* ─────────── Faixa inferior — registros recentes do dia ─────────── */
.recentes-grid {
  margin-top: var(--sp-4);
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: var(--sp-3);
}
.recente {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--cor);
  border-radius: var(--r-md);
  padding: var(--sp-3) var(--sp-4);
  display: flex; flex-direction: column; gap: 6px;
  cursor: pointer; transition: border-color .12s;
}
.recente:hover { border-color: var(--border-strong); border-left-color: var(--cor); }
.recente-tipo {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--cor);
  letter-spacing: 0.10em;
  text-transform: uppercase;
}
.recente-titulo {
  font-size: var(--fs-13);
  color: var(--text-primary);
  font-weight: 500;
}
.recente-meta {
  display: flex; justify-content: space-between;
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--text-muted);
}

@media (max-width: 1100px) {
  .hoje-layout { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="shell-root"></div>
<script src="../_shared/glyphs.js"></script>
<script src="../_shared/shell.js"></script>
<script>
montarShell({
  clusterAtivo: 'bem-estar',
  abaAtiva: 'be-hoje',
  breadcrumb: ['Ouroboros', 'Bem-estar', 'Hoje'],
  acoes: [
    { label: 'Diário emocional', icon: 'heart', href: '19-diario-emocional.html' },
    { label: 'Salvar humor', icon: 'check', primary: true, onClick: "salvarHumor()" },
  ],
});

// Estado humor
const HUMOR = { humor: 4, energia: 3, ansiedade: 2, foco: 4 };
const TAGS_DISPONIVEIS = ['alegria', 'ansiedade', 'calma', 'cansaço', 'foco', 'irritação', 'tranquilidade', 'gratidão'];
const TAGS_ATIVAS = new Set(['calma', 'foco']);
let PARA_ATIVO = 'mim';

const SLIDERS = [
  { key: 'humor',     label: 'humor',     cor: 'var(--accent-pink)',   max: 5 },
  { key: 'energia',   label: 'energia',   cor: 'var(--accent-yellow)', max: 5 },
  { key: 'ansiedade', label: 'ansiedade', cor: 'var(--accent-orange)', max: 5 },
  { key: 'foco',      label: 'foco',      cor: 'var(--accent-cyan)',   max: 5 },
];

function renderSlider(s) {
  const valorAtual = HUMOR[s.key];
  const botoes = Array.from({length: s.max}, (_, i) => {
    const v = i + 1;
    const ativo = v === valorAtual;
    const peso = v <= valorAtual ? 1 : 0;
    return `<button class="${ativo ? 'ativo' : (peso ? 'menor' : '')}"
      style="--cor:${s.cor}; --peso:${valorAtual - i};"
      onclick="setSlider('${s.key}', ${v})">${v}</button>`;
  }).join('');
  return `
    <div class="slider-bloco">
      <div class="slider-label">
        <span class="nome">${s.label}</span>
        <span class="valor" style="color:${s.cor};">${valorAtual}<span style="color:var(--text-muted);font-size:14px;">/${s.max}</span></span>
      </div>
      <div class="slider-pista">${botoes}</div>
    </div>`;
}

function setSlider(k, v) {
  HUMOR[k] = v;
  renderSliders();
}
function renderSliders() {
  document.getElementById('sliders-host').innerHTML = SLIDERS.map(renderSlider).join('');
}

function renderTags() {
  document.getElementById('tags-host').innerHTML = TAGS_DISPONIVEIS.map(t => `
    <button class="tag-chip ${TAGS_ATIVAS.has(t) ? 'ativo' : ''}" onclick="toggleTag('${t}')">${t}</button>
  `).join('');
}
function toggleTag(t) {
  if (TAGS_ATIVAS.has(t)) TAGS_ATIVAS.delete(t); else TAGS_ATIVAS.add(t);
  renderTags();
}

function renderPara() {
  const opcoes = [
    { v: 'mim',    l: 'para mim' },
    { v: 'pessoa-b', l: 'para Pessoa B' },
    { v: 'casal', l: 'para o casal' },
  ];
  document.getElementById('para-host').innerHTML = opcoes.map(o => `
    <button class="para-btn ${o.v === PARA_ATIVO ? 'ativo' : ''}" onclick="setPara('${o.v}')">${o.l}</button>
  `).join('');
}
function setPara(v) { PARA_ATIVO = v; renderPara(); }

function salvarHumor() {
  const tags = [...TAGS_ATIVAS].join(', ') || '—';
  toast(` Humor salvo · daily/2026-03-31.md · humor ${HUMOR.humor}/5 · tags: ${tags}`);
}

document.getElementById('main-root').innerHTML = `
  <div class="page-header">
    <div>
      <h1 class="page-title">HOJE</h1>
      <p class="page-subtitle">Captura de humor em &lt;30 segundos · 4 sliders + tags + nota.
      Persiste em <code style="color:var(--accent-pink);background:var(--bg-inset);padding:1px 6px;border-radius:2px;">daily/2026-03-31.md</code> com sufixo da pessoa ativa.</p>
    </div>
    <div class="page-meta">
      <span class="sprint-tag">M02 → M40</span>
      <span class="pill pill-d7-graduado">streak 12 dias</span>
      <a href="27-privacidade.html" class="pill pill-d7-graduado" style="text-decoration:none;cursor:pointer;" title="Configurar o que B vê"> A↔B</a>
    </div>
  </div>

  <div class="hoje-layout">
    <!-- ESQUERDA: hero humor -->
    <div class="hero-humor">
      <div class="hero-humor-head">
        <h2 class="hero-humor-titulo">Como você está agora?</h2>
        <span class="hero-humor-data">terça · 31 mar · 14:42</span>
      </div>

      <div class="sliders" id="sliders-host"></div>

      <div class="bloco-tags">
        <h4>Tags do momento — multi seleção</h4>
        <div class="tags-grid" id="tags-host"></div>
      </div>

      <div class="inputs-extra">
        <div class="input-bloco">
          <label>Sono (horas)</label>
          <input type="text" value="6,5" />
        </div>
        <div class="input-bloco">
          <label>Medicação tomada</label>
          <input type="text" placeholder="ex.: bupropiona 150mg" value="bupropiona 150mg" />
        </div>
      </div>

      <div class="bloco-nota">
        <textarea placeholder="Nota opcional… (deixe vazio se não vier nada)"></textarea>
      </div>

      <div class="salvar-row">
        <span class="duracao">tempo nesta página: <strong>0:18</strong> · meta &lt; 30s</span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm">${glyph('refresh', 14)} Resetar</button>
          <button class="btn btn-sm btn-primary" onclick="salvarHumor()">${glyph('check', 14)} Salvar humor</button>
        </div>
      </div>
    </div>

    <!-- DIREITA -->
    <div class="coluna-dir">
      <div class="bloco-para">
        <h3>Esse registro é para…</h3>
        <div class="para-opcoes" id="para-host"></div>
      </div>

      <div class="bloco-status">
        <h3>Status do casal — últimos 7 dias</h3>
        <div class="casal-grid">
          <div class="pessoa-card" style="--cor: var(--accent-purple);">
            <div class="pnome">pessoa A · você</div>
            <div class="pmedia">3.8<span style="color:var(--text-muted);font-size:12px;">/5</span></div>
            <div class="pdetalhe">7 registros · ↗ +0.4 vs semana</div>
            <div class="pmini">
              <span style="background:#3a3145;"></span>
              <span style="background:#5e4d80;"></span>
              <span style="background:#8569b8;"></span>
              <span style="background:#a079de;"></span>
              <span style="background:#bd93f9;"></span>
              <span style="background:#bd93f9;"></span>
              <span style="background:#a079de;"></span>
            </div>
          </div>
          <div class="pessoa-card" style="--cor: var(--accent-pink);">
            <div class="pnome">pessoa B</div>
            <div class="pmedia">3.2<span style="color:var(--text-muted);font-size:12px;">/5</span></div>
            <div class="pdetalhe">5 registros · ↘ −0.2 vs semana</div>
            <div class="pmini">
              <span style="background:#5e3145;"></span>
              <span style="background:#80365a;"></span>
              <span style="background:#a83a73;"></span>
              <span style="background:#cc4488;"></span>
              <span style="background:#80365a;"></span>
              <span style="background:#5e3145;"></span>
              <span style="background:#a83a73;"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="bloco-proximos">
        <h3>Próximos · alarmes & tarefas</h3>
        <div class="evt-lista">
          <div class="evt" onclick="toast('Abrindo alarme · medicação noturna')">
            <span class="evt-tipo" style="--cor:var(--accent-orange);">${glyph('alarm', 12)} alarme</span>
            <span class="evt-hora">22:00</span>
            <span class="evt-titulo">Bupropiona noturna</span>
            <span class="evt-tag">recorrente · diário</span>
          </div>
          <div class="evt" onclick="toast('Abrindo tarefa · contas a pagar')">
            <span class="evt-tipo" style="--cor:var(--accent-cyan);">${glyph('list', 12)} tarefa</span>
            <span class="evt-hora">hoje</span>
            <span class="evt-titulo">Pagar fatura C6</span>
            <span class="evt-tag">finanças · mim</span>
          </div>
          <div class="evt" onclick="toast('Abrindo tarefa · treino A')">
            <span class="evt-tipo" style="--cor:var(--accent-cyan);">${glyph('list', 12)} tarefa</span>
            <span class="evt-hora">17:30</span>
            <span class="evt-titulo">Treino A · peito + tríceps</span>
            <span class="evt-tag">rotina · mim</span>
          </div>
          <div class="evt" onclick="toast('Abrindo evento · jantar com Pessoa B')">
            <span class="evt-tipo" style="--cor:var(--accent-pink);">${glyph('calendar', 12)} evento</span>
            <span class="evt-hora">20:00</span>
            <span class="evt-titulo">Jantar com Pessoa B</span>
            <span class="evt-tag">rolezinho · casal</span>
          </div>
          <div class="evt" onclick="toast('Abrindo contador · 47 dias sem fumar')">
            <span class="evt-tipo" style="--cor:var(--accent-green);">${glyph('repeat', 12)} contador</span>
            <span class="evt-hora">47d</span>
            <span class="evt-titulo">Dias sem fumar</span>
            <span class="evt-tag">marco em 13d (60d)</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <h2 class="section-title" style="margin-top:var(--sp-6);font-family:var(--ff-mono);font-size:var(--fs-11);letter-spacing:0.10em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--sp-3);">Registros de hoje</h2>
  <div class="recentes-grid">
    <div class="recente" style="--cor:var(--accent-pink);">
      <div class="recente-tipo">${glyph('heart', 10)} diário · vitória</div>
      <div class="recente-titulo">Consegui terminar o relatório sem travar de ansiedade</div>
      <div class="recente-meta"><span>14:12 · para mim</span><span>2 tags</span></div>
    </div>
    <div class="recente" style="--cor:var(--accent-cyan);">
      <div class="recente-tipo">${glyph('calendar', 10)} evento · trabalho</div>
      <div class="recente-titulo">Reunião com cliente — bairro Pituba</div>
      <div class="recente-meta"><span>10:00 · 1h30</span><span>2 fotos</span></div>
    </div>
