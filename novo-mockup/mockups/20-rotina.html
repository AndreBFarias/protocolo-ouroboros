<link rel="stylesheet" href="../_shared/components.css">
<style>
.rotina-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--sp-4);
}

.rot-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: var(--sp-5);
  display: flex; flex-direction: column;
}
.rot-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-4);
  padding-bottom: var(--sp-3);
  border-bottom: 1px solid var(--border-subtle);
}
.rot-titulo {
  font-family: var(--ff-mono);
  font-size: var(--fs-12);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--cor);
  font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.rot-add {
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  cursor: pointer;
  display: grid; place-items: center;
}
.rot-add:hover { color: var(--cor); border-color: var(--cor); }

.rot-lista { display: flex; flex-direction: column; gap: 6px; }

/* Alarme */
.alarme-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  padding: var(--sp-3);
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--cor);
  border-radius: var(--r-sm);
}
.alarme-hora {
  font-family: var(--ff-mono);
  font-size: var(--fs-24);
  font-weight: 500;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.alarme-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.alarme-titulo {
  font-size: var(--fs-13);
  color: var(--text-primary);
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.alarme-meta {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
.alarme-toggle {
  position: relative;
  width: 36px; height: 20px;
  background: var(--bg-elevated);
  border-radius: var(--r-full);
  cursor: pointer;
  border: 1px solid var(--border-subtle);
}
.alarme-toggle::after {
  content: '';
  position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: var(--text-muted);
  border-radius: 50%;
  transition: transform .15s, background .15s;
}
.alarme-toggle.on { background: var(--cor); border-color: var(--cor); }
.alarme-toggle.on::after { transform: translateX(16px); background: var(--bg-base); }

/* Tarefas */
.tarefa-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  padding: var(--sp-3);
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background .12s;
}
.tarefa-row:hover { background: var(--bg-elevated); }
.tarefa-row.feita { opacity: 0.55; }
.tarefa-row.feita .tarefa-titulo { text-decoration: line-through; color: var(--text-muted); }

.checkbox {
  width: 18px; height: 18px;
  border: 1.5px solid var(--border-strong);
  border-radius: 3px;
  display: grid; place-items: center;
  background: var(--bg-base);
  flex-shrink: 0;
}
.checkbox.on {
  background: var(--cor);
  border-color: var(--cor);
}
.checkbox.on svg { color: var(--bg-base); }
.tarefa-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.tarefa-titulo {
  font-size: var(--fs-13);
  color: var(--text-primary);
}
.tarefa-meta {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--text-muted);
  display: flex; gap: 8px;
}
.tarefa-meta .prio-h { color: var(--accent-red); }
.tarefa-meta .prio-m { color: var(--accent-yellow); }
.tarefa-meta .prio-l { color: var(--text-muted); }

.subgrupo {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  padding: var(--sp-3) 0 var(--sp-2);
}

/* Contadores */
.contador-row {
  padding: var(--sp-4);
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--cor);
  border-radius: var(--r-sm);
  display: flex; flex-direction: column; gap: 8px;
}
.contador-head {
  display: flex; align-items: baseline; justify-content: space-between;
}
.contador-titulo {
  font-size: var(--fs-13);
  color: var(--text-primary);
  font-weight: 500;
}
.contador-tipo {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--cor);
  letter-spacing: 0.10em;
  text-transform: uppercase;
}
.contador-valor {
  font-family: var(--ff-mono);
  font-size: var(--fs-32);
  font-weight: 500;
  color: var(--cor);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.contador-valor small {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
}
.contador-progresso {
  height: 6px;
  background: var(--bg-elevated);
  border-radius: var(--r-full);
  overflow: hidden;
  position: relative;
}
.contador-progresso > span {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--cor);
  border-radius: var(--r-full);
}
.contador-meta {
  display: flex; justify-content: space-between;
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--text-muted);
}
.contador-marcos {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-top: 4px;
}
.marco {
  font-family: var(--ff-mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: var(--r-xs);
  background: var(--bg-elevated);
  color: var(--text-muted);
  border: 1px solid var(--border-subtle);
}
.marco.bati {
  background: rgba(80,250,123,0.10);
  color: var(--accent-green);
  border-color: rgba(80,250,123,0.25);
}

/* Resumo do topo */
.rotina-resumo {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-3);
  margin-bottom: var(--sp-4);
}
.resumo-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: var(--sp-4);
}
.resumo-card .l {

  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.resumo-card .v {

}
.resumo-card .sub {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}

@media (max-width: 1100px) {
  .rotina-grid { grid-template-columns: 1fr; }
  .rotina-resumo { grid-template-columns: 1fr 1fr; }
}
