// Sankey-ish ribbons
function sankey(w=540, h=320) {
  const inflows = [{n:'Salário PJ', v:13800, c:'#50fa7b', y:30}, {n:'Consultoria', v:3214, c:'#8be9fd', y:130}, {n:'Dividendos', v:480, c:'#f1fa8c', y:200}];
  const outflows = [
    {n:'Casa', v:2840, c:'#bd93f9', y:20}, {n:'Alimentação', v:3252, c:'#ff79c6', y:90}, {n:'Investimento', v:3200, c:'#50fa7b', y:160},
    {n:'Saúde', v:1402, c:'#50fa7b', y:230}, {n:'Outros', v:1370, c:'#ffb86c', y:280},
  ];
  const totalIn = inflows.reduce((a,c)=>a+c.v,0);
  const totalOut = outflows.reduce((a,c)=>a+c.v,0);
  let curIn = 20, curOut = 20;
  const ribbons = inflows.flatMap(i => {
    const ribsHere = outflows.map(o => {
      const portion = i.v * (o.v/totalOut);
      const inH = (portion/totalIn) * (h-40);
      const outH = (portion/totalOut) * (h-40);
      const y1Top = curIn; curIn += inH;
      // determine y2 (we'll allocate from outflow column)
      return { from:i, to:o, h:inH, oh: outH };
    });
    return ribsHere;
  });
  // recompute outflow positions
  const outAlloc = {};
  outflows.forEach(o => outAlloc[o.n] = 20);
  let curIn2 = 20;
  let svgRibs = '';
  inflows.forEach(i => {
    let inY = curIn2;
    outflows.forEach(o => {
      const portion = i.v * (o.v/totalOut);
      const inH = (portion/totalIn) * (h-40);
      const outH = (portion/totalOut) * (h-40);
      const y1 = inY; const y1b = inY + inH;
      const y2 = outAlloc[o.n]; const y2b = outAlloc[o.n] + outH;
      const x1 = 130, x2 = w-130;
      const cx = (x1+x2)/2;
      svgRibs += `<path d="M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2} L ${x2} ${y2b} C ${cx} ${y2b}, ${cx} ${y1b}, ${x1} ${y1b} Z" fill="${i.c}" opacity="0.18" />`;
      inY = y1b; outAlloc[o.n] = y2b;
    });
    curIn2 += (i.v/totalIn) * (h-40);
  });
  // bars
  let inAccum = 20;
  const inBars = inflows.map(i => {
    const ih = (i.v/totalIn) * (h-40);
    const y = inAccum;
    inAccum += ih;
    return `<rect x="120" y="${y}" width="10" height="${ih-2}" fill="${i.c}" rx="1"/>
      <text x="115" y="${y+ih/2+4}" text-anchor="end" font-family="JetBrains Mono" font-size="11" fill="var(--text-secondary)">${i.n}</text>
      <text x="115" y="${y+ih/2+18}" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="var(--text-muted)">${fmt(i.v)}</text>`;
  }).join('');
  let outAccum = 20;
  const outBars = outflows.map(o => {
    const oh = (o.v/totalOut) * (h-40);
    const y = outAccum;
    outAccum += oh;
    return `<rect x="${w-130}" y="${y}" width="10" height="${oh-2}" fill="${o.c}" rx="1"/>
      <text x="${w-115}" y="${y+oh/2+4}" font-family="JetBrains Mono" font-size="11" fill="var(--text-secondary)">${o.n}</text>
      <text x="${w-115}" y="${y+oh/2+18}" font-family="JetBrains Mono" font-size="10" fill="var(--text-muted)">${fmt(o.v)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;">
    <text x="20" y="14" font-family="JetBrains Mono" font-size="10" fill="var(--text-muted)" letter-spacing="0.06em">ENTRADAS · ${fmt(totalIn)}</text>
    <text x="${w-20}" y="14" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="var(--text-muted)" letter-spacing="0.06em">SAÍDAS · ${fmt(totalOut)}</text>
    ${svgRibs}${inBars}${outBars}
  </svg>`;
}

// Heatmap calendário 12 meses (52 semanas x 7 dias) — tons de roxo
function heatmap() {
  const weeks = 53;
  const days = ['','seg','','qua','','sex',''];
  let cells = '';
  for (let dow=0; dow<7; dow++) {
    cells += `<div class="hm-label">${days[dow]}</div>`;
    for (let w=0; w<weeks; w++) {
      const idx = w*7+dow;
      // Pseudo-random based on patterns: weekends low; specific weeks high
      const isWeekend = dow>=5;
      const baseV = isWeekend ? 0.35 : 0.55;
      const seed = Math.sin(idx*0.7) * Math.cos(idx*0.31);
      const monthEnd = (w%4)===3 && dow>=2 && dow<=4;
      const weekendFood = isWeekend && (w%3===0);
      let intensity = baseV + seed*0.3;
      if (monthEnd) intensity += 0.3;
      if (weekendFood) intensity += 0.2;
      intensity = Math.max(0, Math.min(1, intensity));
      const alpha = 0.05 + intensity * 0.85;
      const color = `rgba(189,147,249,${alpha.toFixed(2)})`;
      cells += `<div class="hm-cell" style="background:${color};" title="sem ${w+1} · ${days[dow]||['dom','','ter','','qui','','sáb'][dow]}"></div>`;
    }
  }
  return cells;
}
