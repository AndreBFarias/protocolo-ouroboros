<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Ouroboros — Revisor (Apuração de Transações)</title>
<link rel="stylesheet" href="../_shared/tokens.css">
<link rel="stylesheet" href="../_shared/components.css">
<style>
.fourway {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) repeat(3, minmax(0, 1fr));
  gap: var(--sp-3);
  align-items: stretch;
}
.fw-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  display: flex; flex-direction: column;
  min-height: 0; overflow: hidden;
}
.fw-card .fw-head {
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between; gap: var(--sp-2);
}
.fw-card .fw-head .ttl { font-family: var(--ff-mono); font-size: var(--fs-12); letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
.fw-card .fw-head .src { font-family: var(--ff-mono); font-size: var(--fs-14); font-weight: 500; }
.fw-card .fw-body { padding: var(--sp-3) var(--sp-4); flex: 1; overflow: auto; }

/* Distinção semântica das colunas */
.col-ofx     .fw-head { background: linear-gradient(180deg, rgba(80,250,123,0.06), transparent); }
.col-rascunho .fw-head { background: linear-gradient(180deg, rgba(241,250,140,0.06), transparent); }
.col-opus    .fw-head { background: linear-gradient(180deg, rgba(189,147,249,0.06), transparent); }
.col-humano  .fw-head { background: linear-gradient(180deg, rgba(255,121,198,0.06), transparent); }

.col-icon { width: 18px; height: 18px; display: inline-flex; }
.col-ofx .col-icon { color: var(--d7-graduado); }
.col-rascunho .col-icon { color: var(--accent-yellow); }
.col-opus .col-icon { color: var(--accent-purple); }
.col-humano .col-icon { color: var(--accent-pink); }

.field { display: grid; grid-template-columns: 100px 1fr; align-items: baseline; gap: var(--sp-2); padding: 6px 0; border-bottom: 1px dashed var(--border-subtle); }
.field:last-child { border-bottom: 0; }
.field .k { font-family: var(--ff-mono); font-size: var(--fs-11); letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); }
.field .v { font-family: var(--ff-mono); font-size: var(--fs-13); color: var(--text-primary); word-break: break-word; }
.field .v.muted { color: var(--text-muted); }
.field .v.diff  { background: var(--diff-added-bg); padding: 1px 4px; border-radius: var(--r-xs); }
.field .v.miss  { color: var(--text-muted); font-style: italic; }
.field .v input, .field .v select, .field .v textarea {
  width: 100%; background: var(--bg-inset); color: var(--text-primary);
  border: 1px solid var(--border-subtle); border-radius: var(--r-sm);
  padding: 4px 6px; font-family: var(--ff-mono); font-size: var(--fs-13);
}
.field .v textarea { resize: vertical; min-height: 56px; }

.action-row {
  display: flex; gap: var(--sp-2); padding: var(--sp-3) var(--sp-4);
  border-top: 1px solid var(--border-subtle); background: var(--bg-inset);
}
.transacao-list {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  overflow: hidden;
}
.t-row {
  display: grid;
  grid-template-columns: 90px 80px 1fr 110px 110px 90px 28px;
  gap: var(--sp-2); align-items: center;
  padding: 8px 12px; cursor: pointer;
  border-bottom: 1px solid var(--border-subtle);
  font-family: var(--ff-mono); font-size: var(--fs-12);
}
.t-row:hover { background: var(--bg-inset); }
.t-row.sel  { background: rgba(189,147,249,0.06); }
.t-row .data { color: var(--text-muted); font-variant-numeric: tabular-nums; }
.t-row .desc { color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-row .val  { text-align: right; font-variant-numeric: tabular-nums; }
.t-row .val.neg { color: var(--accent-red); }
.t-row .val.pos { color: var(--d7-graduado); }
.estado-pill {
  font-family: var(--ff-mono); font-size: 10px;
  padding: 2px 6px; border-radius: var(--r-xs); border: 1px solid var(--border-subtle);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.transacao-tabs {
  display: flex; gap: var(--sp-1); padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--border-subtle); background: var(--bg-inset);
}
.transacao-tabs .tab {
  font-family: var(--ff-mono); font-size: var(--fs-11);
  padding: 4px 10px; border-radius: var(--r-sm);
  color: var(--text-muted); cursor: pointer;
  border: 1px solid transparent;
}
.transacao-tabs .tab.active { color: var(--text-primary); border-color: var(--border-subtle); background: var(--bg-surface); }
</style>
</head>
<body>
<div id="shell-root"></div>
<script src="../_shared/glyphs.js"></script>
<script src="../_shared/shell.js"></script>
<script src="./_revisor-data.js"></script>
<script src="./_revisor-render.js"></script>
</body>
</html>
